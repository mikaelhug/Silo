name: Release

# Build + publish a Silo release when a v* tag is pushed (the ONLY thing that builds the app —
# there is no per-push CI; verify locally with `Scripts/test.sh`). Wine builds separately and only
# when a new CrossOver version appears (build-wine.yml / wine-autoupdate.yml).
#
#   1. bump `SILO_VERSION` in versions.env, then run `Scripts/gen-versions.sh`
#   2. git tag vX.Y.Z && git push origin vX.Y.Z
#
# The tag must match `SILO_VERSION` in versions.env (the verify step fails otherwise) — the in-app
# Updater compares versions, so the published tag has to equal the version you ship.
# A manual run (workflow_dispatch) builds + uploads an artifact for inspection but does NOT publish.
on:
  push:
    tags: ['v*']
  workflow_dispatch: {}

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  app:
    runs-on: macos-26
    timeout-minutes: 30
    env:
      HAS_NOTARY: ${{ secrets.AC_API_KEY_ID }}
    steps:
      - uses: actions/checkout@v7

      - name: Show toolchain
        run: swift --version

      - name: Verify tag matches the version in versions.env
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          set -a; . ./versions.env; set +a
          if [ "${GITHUB_REF_NAME}" != "v${SILO_VERSION}" ]; then
            echo "::error::tag ${GITHUB_REF_NAME} != v${SILO_VERSION} (versions.env). Bump SILO_VERSION in versions.env (then Scripts/gen-versions.sh) to match the tag."
            exit 1
          fi

      - name: Test (gate the release)
        run: ./Scripts/test.sh

      - name: Build + assemble Silo.app (ad-hoc signed)
        run: ./Scripts/build-app.sh

      - name: Smoke-test the bundled binary
        run: SILO_SMOKE=1 dist/Silo.app/Contents/MacOS/Silo

      - name: Package Silo.zip
        run: ditto -c -k --keepParent dist/Silo.app dist/Silo.zip

      - name: Compute Silo.zip SHA-256 (the in-app updater verifies this fail-closed)
        run: shasum -a 256 dist/Silo.zip | awk '{print $1}' > dist/Silo.zip.sha256

      # Optional notarization — gated on secrets (AC_API_KEY_ID, AC_API_ISSUER_ID, AC_API_KEY_BASE64).
      - name: Notarize
        if: ${{ env.HAS_NOTARY != '' }}
        env:
          KEY_ID: ${{ secrets.AC_API_KEY_ID }}
          ISSUER: ${{ secrets.AC_API_ISSUER_ID }}
          KEY_B64: ${{ secrets.AC_API_KEY_BASE64 }}
        run: |
          echo "$KEY_B64" | base64 --decode > "$RUNNER_TEMP/ac.p8"
          xcrun notarytool submit dist/Silo.zip --key "$RUNNER_TEMP/ac.p8" \
            --key-id "$KEY_ID" --issuer "$ISSUER" --wait || true

      - name: Upload build artifact (every run, for inspection)
        uses: actions/upload-artifact@v7
        with:
          name: silo-app
          path: dist/Silo.zip
          retention-days: 7

      - name: Publish GitHub Release
        if: startsWith(github.ref, 'refs/tags/')   # tags publish a downloadable release; manual runs don't
        uses: softprops/action-gh-release@v3
        with:
          files: |
            dist/Silo.zip
            dist/Silo.zip.sha256
          generate_release_notes: true
          fail_on_unmatched_files: true
