name: Build DXMT (older-games backend)

# Self-reliant DXMT pipeline: build 3Shain's DXMT (the Metal D3D10/11 layer Silo overlays as the GPTK
# fallback) from its upstream source against Silo's CrossOver Wine, and publish it to this repo's
# Releases — so the app never depends on a third-party prebuilt that may go stale.
#
# We pin the EXACT DXMT version CrossOver 26 bundles and build it against the matching CrossOver Wine
# (the published wine-cx-* release this repo builds), so DXMT↔Wine is the pairing CrossOver itself ships.
# DXMT is NOT Wine, so constraint #8 (Wine = CrossOver-FOSS only) is unaffected; we build from DXMT's
# upstream for its canonical, reproducible build incl. the git submodules CrossOver's tarball omits.
#
# CAVEAT: like the Wine build this is intricate + slow (compiles Metal shaders + airconv; needs full
# Xcode's Metal toolchain) and will need iteration against real CI logs. It is intentionally manual
# (workflow_dispatch). See also Scripts/build-dxmt.sh (the identical local recipe).

on:
  workflow_dispatch:
    # All versions come from versions.env (the single source of truth); these are OPTIONAL overrides —
    # leave blank to use versions.env. Keeps the workflow from drifting out of sync with the repo.
    inputs:
      dxmt_version:
        description: "Override DXMT tag (blank = DXMT_VERSION from versions.env)"
        required: false
        default: ""
      llvm_mingw_version:
        description: "Override llvm-mingw version (blank = LLVM_MINGW_VERSION from versions.env)"
        required: false
        default: ""
      wine_release_tag:
        description: "Override the CrossOver Wine release to build against (blank = wine-cx-<CROSSOVER_VERSION>)"
        required: false
        default: ""
      release_tag:
        description: "Override the published release tag (blank = dxmt-<DXMT_VERSION>-cx<wine version>)"
        required: false
        default: ""
  workflow_call:
    # Chained from wine-autoupdate.yml after a new wine-cx-* is published, so DXMT is rebuilt against it
    # (DXMT's winemetal.so ABI-links a specific wine — keep the pairing fresh).
    inputs:
      dxmt_version:
        required: false
        type: string
        default: ""
      llvm_mingw_version:
        required: false
        type: string
        default: ""
      wine_release_tag:
        required: false
        type: string
        default: ""
      release_tag:
        required: false
        type: string
        default: ""

permissions:
  contents: write

concurrency:
  # One DXMT build at a time; don't cancel an in-flight build.
  group: dxmt-build
  cancel-in-progress: false

jobs:
  build:
    # macos-26 matches the app build (release.yml) and the runtime's deploy target; it ships Xcode with
    # the Metal toolchain DXMT's shader compile needs.
    runs-on: macos-26
    timeout-minutes: 180
    env:
      # DXMT must be x86_64 to match the x86_64 CrossOver Wine + winemetal.so (Rosetta).
      ARCH_PREFIX: "arch -x86_64"
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v7

      - name: Resolve versions (versions.env is the single source of truth; inputs override)
        env:
          IN_DXMT: ${{ inputs.dxmt_version }}
          IN_MINGW: ${{ inputs.llvm_mingw_version }}
          IN_WINE: ${{ inputs.wine_release_tag }}
          IN_REL: ${{ inputs.release_tag }}
        run: |
          set -eo pipefail
          # shellcheck disable=SC1091
          set -a; . ./versions.env; set +a
          DXMT_VER="${IN_DXMT:-$DXMT_VERSION}"
          MINGW_VER="${IN_MINGW:-$LLVM_MINGW_VERSION}"
          WINE_TAG="${IN_WINE:-wine-cx-$CROSSOVER_VERSION}"
          CX_VER="${WINE_TAG#wine-cx-}"   # the CrossOver version this DXMT is built against → into the tag
          REL_TAG="${IN_REL:-dxmt-$DXMT_VER-cx$CX_VER}"
          {
            echo "DXMT_REPO=$DXMT_REPO"
            echo "DXMT_VER=$DXMT_VER"
            echo "MINGW_VER=$MINGW_VER"
            echo "MINGW_DIR=llvm-mingw-$MINGW_VER-ucrt-macos-universal"
            echo "WINE_TAG=$WINE_TAG"
            echo "REL_TAG=$REL_TAG"
          } >> "$GITHUB_ENV"
          echo "Building $DXMT_REPO@$DXMT_VER against $WINE_TAG → publishing $REL_TAG"

      - name: Select Xcode + ensure Metal toolchain
        run: |
          set -eo pipefail
          # Prefer Xcode 16 (the toolchain DXMT v0.72 is upstream-tested with) if the runner still ships
          # it; otherwise use the runner's default Xcode (macos-26's Xcode also has the Metal toolchain).
          shopt -s nullglob
          xcodes=(/Applications/Xcode_16*.app)
          if [ ${#xcodes[@]} -gt 0 ]; then sudo xcode-select -s "${xcodes[0]}"; fi
          echo "Using $(xcode-select -p)"
          # Xcode 16+/26 split the Metal compiler into a separate component: the `metal` binary exists but
          # `metal -c` fails until it's installed. Fetch it (idempotent), then verify by ACTUALLY compiling
          # a probe shader (a bare `-f metal` check is NOT enough — binary present != can compile).
          xcodebuild -downloadComponent MetalToolchain 2>/dev/null || true
          printf 'kernel void _p() {}' > "$RUNNER_TEMP/p.metal"
          xcrun -sdk macosx metal -c "$RUNNER_TEMP/p.metal" -o "$RUNNER_TEMP/p.air"   # hard-fail if Metal can't compile

      - name: Install Rosetta 2
        run: softwareupdate --install-rosetta --agree-to-license || true

      - name: Build dependencies (x86_64 Homebrew)
        run: |
          set -eo pipefail
          # x86_64 Homebrew under Rosetta so llvm@15 + meson match the x86_64 DXMT we build.
          # shellcheck disable=SC2016  # the $(...) must run in the spawned bash, not expand here
          if [ ! -x /usr/local/bin/brew ]; then
            $ARCH_PREFIX /bin/bash -c '/bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"'
          fi
          BREW=/usr/local/bin/brew
          test -x "$BREW"
          export HOMEBREW_NO_AUTO_UPDATE=1 HOMEBREW_NO_INSTALL_CLEANUP=1 HOMEBREW_NO_ENV_HINTS=1
          # The runner pre-seeds /usr/local/bin with macOS Python.framework shims that block Homebrew's
          # python keg-link (meson pulls python). Remove just those shims so the install is error-free.
          for shim in /usr/local/bin/*; do
            if [ -L "$shim" ] && readlink "$shim" 2>/dev/null | grep -q "Python.framework"; then
              sudo rm -f "$shim"
            fi
          done
          $ARCH_PREFIX "$BREW" install llvm@15 meson ninja || true
          missing=""
          for f in llvm@15 meson ninja; do
            $ARCH_PREFIX "$BREW" --prefix "$f" >/dev/null 2>&1 || missing="$missing $f"
          done
          if [ -n "$missing" ]; then echo "::error::required brew formulae failed to install:$missing"; exit 1; fi
          echo "BREW=$BREW" >> "$GITHUB_ENV"
          echo "LLVM15=$($ARCH_PREFIX "$BREW" --prefix llvm@15)" >> "$GITHUB_ENV"

      - name: Download the CrossOver Wine to build against
        run: |
          set -eo pipefail
          # The wine-cx-* release (built by build-wine.yml) carries wine.tar.xz = a full Wine install with
          # the headers + import libs (winecrt0/ntdll/dbghelp) DXMT's winemetal.so links against.
          gh release download "$WINE_TAG" --repo "$GITHUB_REPOSITORY" \
            --pattern 'wine.tar.xz' --dir "$RUNNER_TEMP/wine-dl"
          mkdir -p "$RUNNER_TEMP/wine-install"
          tar -xJf "$RUNNER_TEMP/wine-dl/wine.tar.xz" -C "$RUNNER_TEMP/wine-install"
          test -d "$RUNNER_TEMP/wine-install/lib/wine/x86_64-windows"
          echo "WINE_INSTALL=$RUNNER_TEMP/wine-install" >> "$GITHUB_ENV"

      - name: Fetch DXMT source + submodules
        run: |
          set -eo pipefail
          # Keep .git so meson stamps the version from the tag (vcs_tag → version.h).
          git clone --depth 1 --branch "$DXMT_VER" --recurse-submodules --shallow-submodules \
            "https://github.com/${DXMT_REPO}.git" "$RUNNER_TEMP/dxmt"
          # The cross toolchain DXMT's build-win64.txt pins, placed where @GLOBAL_SOURCE_ROOT@ expects it.
          mkdir -p "$RUNNER_TEMP/dxmt/toolchains"
          curl -fL "https://github.com/mstorsjo/llvm-mingw/releases/download/${MINGW_VER}/${MINGW_DIR}.tar.xz" -o "$RUNNER_TEMP/llvm-mingw.tar.xz"
          tar -xf "$RUNNER_TEMP/llvm-mingw.tar.xz" -C "$RUNNER_TEMP/dxmt/toolchains"
          test -x "$RUNNER_TEMP/dxmt/toolchains/$MINGW_DIR/bin/x86_64-w64-mingw32-gcc"
          echo "DXMT_SRC=$RUNNER_TEMP/dxmt" >> "$GITHUB_ENV"

      - name: Configure + build (x86_64, release)
        run: |
          set -eo pipefail
          cd "$DXMT_SRC"
          # Native (macOS) toolchain for winemetal.so + airconv: pin the SYSTEM clang by ABSOLUTE path,
          # x86_64. Load-bearing — llvm-mingw AND llvm@15 each ship a bare `clang` that would shadow the
          # Apple clang on PATH and can't link macOS binaries (ld: library 'System' not found). echo (not a
          # heredoc) so YAML block indentation can't leak into the meson file.
          {
            echo "[binaries]"
            echo "c = ['/usr/bin/clang', '-arch', 'x86_64']"
            echo "cpp = ['/usr/bin/clang++', '-arch', 'x86_64']"
          } > silo-osx.txt
          # Cross toolchain (llvm-mingw) is absolute in build-win64.txt and llvm@15 is via
          # -Dnative_llvm_path, so keep them AFTER the system dirs on PATH (system clang/ld/ar win).
          export PATH="$PATH:$DXMT_SRC/toolchains/$MINGW_DIR/bin:$LLVM15/bin"
          # -Dwine_builtin_dll=true: all dlls (d3d + winemetal) install to <arch>-windows as BUILTIN — the
          # layout Silo overlays (v0.72 defaults false, dropping d3d in system32 as native).
          # Build BOTH ABIs into the SAME install prefix so 32-bit games (e.g. Overcooked 2) get DXMT too:
          # win64 → install/x86_64-windows (+ x86_64-unix/winemetal.so), win32 → install/i386-windows. Wine
          # auto-selects the tree by the game's PE machine type; the i386 PE winemetal.dll thunks into the
          # shared host-arch x86_64-unix/winemetal.so (new-WoW64), so 32-bit ships no unix .so of its own.
          build_abi() {  # $1 = cross-file, $2 = build dir
            $ARCH_PREFIX meson setup \
              --cross-file "$1" --native-file silo-osx.txt \
              -Dnative_llvm_path="$LLVM15" \
              -Dwine_install_path="$WINE_INSTALL" \
              -Dwine_builtin_dll=true \
              "$2" --buildtype release --prefix "$DXMT_SRC/install" --strip
            $ARCH_PREFIX meson compile -C "$2"
            $ARCH_PREFIX meson install -C "$2"
          }
          build_abi build-win64.txt build
          build_abi build-win32.txt build32

      - name: Verify artifacts
        run: |
          set -eo pipefail
          cd "$DXMT_SRC"
          unix="install/x86_64-unix"
          for win in install/x86_64-windows install/i386-windows; do
            for f in "$win/d3d11.dll" "$win/dxgi.dll" "$win/d3d10core.dll" "$win/winemetal.dll"; do
              test -e "$f" || { echo "::error::missing artifact $f"; exit 1; }
            done
          done
          test -e "$unix/winemetal.so" || { echo "::error::missing artifact $unix/winemetal.so"; exit 1; }
          file "$unix/winemetal.so" | grep -q x86_64 || { echo "::error::winemetal.so is not x86_64"; exit 1; }

      - name: Package dxmt.tar.xz
        run: |
          set -eo pipefail
          # Ship x86_64-windows + i386-windows + x86_64-unix as siblings (overlayDXMT reads winemetal.so from
          # the x86_64-unix sibling of the imported x86_64-windows folder, and picks up i386-windows too);
          # drop build-time import libs (*.a). Include i386-unix only if the build produced one.
          i386_unix=""; [ -d "$DXMT_SRC/install/i386-unix" ] && i386_unix="i386-unix"
          ( cd "$DXMT_SRC/install" && tar -cJf "$GITHUB_WORKSPACE/dxmt.tar.xz" --exclude='*.a' x86_64-windows i386-windows x86_64-unix $i386_unix )
          ( cd "$GITHUB_WORKSPACE" && shasum -a 256 dxmt.tar.xz > dxmt.tar.xz.sha256 )
          ls -la "$GITHUB_WORKSPACE/dxmt.tar.xz" "$GITHUB_WORKSPACE/dxmt.tar.xz.sha256"

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ env.REL_TAG }}
          name: ${{ env.REL_TAG }}
          files: |
            dxmt.tar.xz
            dxmt.tar.xz.sha256
          body: "DXMT ${{ env.DXMT_VER }} (${{ env.DXMT_REPO }}) built against this repo's CrossOver Wine (${{ env.WINE_TAG }}) — the older-games D3D10/11 backend. In Silo: Settings → DXMT → Download Latest (or import the extracted x86_64-windows folder)."
