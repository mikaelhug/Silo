name: Build Wine (CrossOver source)

# Self-reliant Wine pipeline: build CrossOver's Wine from CrossOver's own FOSS source (LGPL, the same
# base Apple's GPTK is built from) and publish it to this repo's Releases, so the app never depends on
# a third-party prebuilt that may go stale. See WINE-BUILD.md.
#
# We do NOT bundle GPTK / D3DMetal — that is Apple-licensed and the user imports it from their own
# GPTK .dmg in the app. This workflow produces Wine only.
#
# CAVEAT: building Wine for macOS is intricate, slow (compiles LLVM/Clang; ~30–60 min) and the exact
# dependencies/flags vary per CrossOver version. This recipe is a faithful starting point that will
# need iteration against real CI logs — it is intentionally manual (workflow_dispatch) and not yet
# validated end-to-end.

on:
  workflow_dispatch:
    inputs:
      crossover_version:
        description: "CrossOver source version, e.g. 26.2.0 (must exist at media.codeweavers.com/pub/crossover/source/)"
        required: true
      release_tag:
        description: "Release tag to publish, e.g. wine-cx-26.2.0"
        required: true
  workflow_call:   # invoked by wine-autoupdate.yml when a new CrossOver version appears
    inputs:
      crossover_version:
        required: true
        type: string
      release_tag:
        required: true
        type: string

permissions:
  contents: write

concurrency:
  # One build per CrossOver version; don't cancel an in-flight ~45-min build.
  group: wine-build-${{ inputs.crossover_version }}
  cancel-in-progress: false

jobs:
  build:
    # macos-26 matches the app build (release.yml) + the runtime's deploy target (macOS 26). The build is
    # x86_64 under Rosetta regardless of the runner's host arch.
    runs-on: macos-26
    timeout-minutes: 120
    env:
      # CrossOver is x86_64 (runs on Apple Silicon via Rosetta); build the x86_64 Wine.
      ARCH_PREFIX: "arch -x86_64"
      CCACHE_DIR: ${{ github.workspace }}/.ccache
    steps:
      - uses: actions/checkout@v7

      - name: Install Rosetta 2
        run: softwareupdate --install-rosetta --agree-to-license || true

      - name: Cache ccache (speeds up repeat builds)
        uses: actions/cache@v6
        with:
          path: ${{ github.workspace }}/.ccache
          key: ccache-wine-${{ inputs.crossover_version }}
          restore-keys: ccache-wine-

      - name: Build dependencies (x86_64 Homebrew)
        run: |
          set -eo pipefail
          # x86_64 Homebrew under Rosetta so deps match the x86_64 Wine we build.
          if [ ! -x /usr/local/bin/brew ]; then
            $ARCH_PREFIX /bin/bash -c '/bin/bash -c "$(curl -fsSL https://raw.githubusercontent.com/Homebrew/install/HEAD/install.sh)"'
          fi
          BREW=/usr/local/bin/brew
          test -x "$BREW"
          export HOMEBREW_NO_AUTO_UPDATE=1 HOMEBREW_NO_INSTALL_CLEANUP=1 HOMEBREW_NO_ENV_HINTS=1
          # PREVENT the keg-link conflict at its source: the runner pre-seeds /usr/local/bin with macOS
          # Python.framework shims (idle3, 2to3, python3.*, …) that block Homebrew's python keg-link
          # ("Could not symlink bin/idle3 — already exists") when gstreamer pulls python as a dependency.
          # We don't use the framework Python — remove just those shims (any /usr/local/bin symlink pointing
          # into Python.framework) so brew links python cleanly and the dependency install is error-free.
          for shim in /usr/local/bin/*; do
            if [ -L "$shim" ] && readlink "$shim" 2>/dev/null | grep -q "Python.framework"; then
              sudo rm -f "$shim"
            fi
          done
          # Install the build deps. `|| true` + the explicit assert below remain a backstop for any other
          # transient keg-link conflict: we reference every formula by `brew --prefix` (its Cellar path),
          # never the linked name, so a stray link failure is harmless as long as the formula is installed.
          $ARCH_PREFIX "$BREW" install bison mingw-w64 freetype gnutls gstreamer molten-vk cmake ccache pkgconf || true
          missing=""
          for f in bison mingw-w64 freetype gnutls gstreamer cmake ccache pkgconf; do
            $ARCH_PREFIX "$BREW" --prefix "$f" >/dev/null 2>&1 || missing="$missing $f"
          done
          if [ -n "$missing" ]; then echo "::error::required brew formulae failed to install:$missing"; exit 1; fi
          echo "BREW=$BREW" >> "$GITHUB_ENV"

      - name: Fetch CrossOver source
        run: |
          set -eo pipefail
          VER="${{ inputs.crossover_version }}"
          URL="https://media.codeweavers.com/pub/crossover/source/crossover-sources-${VER}.tar.gz"
          echo "Downloading $URL"
          curl -fL "$URL" -o crossover-sources.tar.gz
          mkdir -p src && tar -xzf crossover-sources.tar.gz -C src
          # The tarball contains a wine source tree (path varies by version: sources/wine or wine).
          WINE_SRC=$(find src -maxdepth 3 -type d -name wine | head -1)
          test -n "$WINE_SRC"
          echo "WINE_SRC=$WINE_SRC" >> "$GITHUB_ENV"

      - name: Configure + build Wine (wow64, x86_64)
        run: |
          set -eo pipefail
          BREW_PREFIX="$($ARCH_PREFIX "$BREW" --prefix)"
          export PATH="$($ARCH_PREFIX "$BREW" --prefix ccache)/libexec:$($ARCH_PREFIX "$BREW" --prefix bison)/bin:$($ARCH_PREFIX "$BREW" --prefix pkgconf)/bin:$PATH"
          export PKG_CONFIG_PATH="$($ARCH_PREFIX "$BREW" --prefix gnutls)/lib/pkgconfig:$($ARCH_PREFIX "$BREW" --prefix freetype)/lib/pkgconfig:$($ARCH_PREFIX "$BREW" --prefix gstreamer)/lib/pkgconfig:$BREW_PREFIX/lib/pkgconfig:${PKG_CONFIG_PATH:-}"
          export CPPFLAGS="-I$($ARCH_PREFIX "$BREW" --prefix gnutls)/include -I$($ARCH_PREFIX "$BREW" --prefix freetype)/include ${CPPFLAGS:-}"
          export LDFLAGS="-L$($ARCH_PREFIX "$BREW" --prefix gnutls)/lib -L$($ARCH_PREFIX "$BREW" --prefix freetype)/lib -L$BREW_PREFIX/lib ${LDFLAGS:-}"
          export CC="clang -arch x86_64"
          export CXX="clang++ -arch x86_64"
          pkg-config --modversion gnutls
          pkg-config --cflags --libs gnutls
          file "$($ARCH_PREFIX "$BREW" --prefix gnutls)/lib/libgnutls.dylib"
          mkdir -p build wine-install
          cd build
          # Single wow64 tree (32+64-bit PE) — adjust flags per CrossOver version as CI reveals.
          # ccache (PATH-shimmed above) caches object files across runs to speed repeat builds.
          #
          # -fvisibility=default: build Wine with all symbols visible so winemac.drv ('macdrv') exposes its
          # Metal/window-surface helpers via dlsym — this is what lets GPTK/D3DMetal GAMES present (without
          # it D3D→Metal output is black for layered windows). It is NOT what fixes the Steam *client* CEF
          # UI: that black window is fixed at RUNTIME by forcing CEF onto its SwiftShader software-GL
          # renderer (STEAM_CEF_COMMAND_LINE + the --in-process-gpu wrapper, see SteamBottle). Set on BOTH
          # CFLAGS and CROSSCFLAGS. -O2 restores the optimization an explicit CFLAGS would otherwise drop.
          $ARCH_PREFIX env CFLAGS="-fvisibility=default -O2" CROSSCFLAGS="-fvisibility=default -O2" \
            "$GITHUB_WORKSPACE/$WINE_SRC/configure" \
            --prefix="$GITHUB_WORKSPACE/wine-install" \
            --enable-archs=i386,x86_64 \
            --disable-tests --without-x \
            --with-freetype --with-gstreamer --with-gnutls \
            --without-sdl  # winebus's SDL backend dlopens libSDL2 → off-main-thread NSAlert aborts Wine on macOS
          $ARCH_PREFIX make -j"$(sysctl -n hw.ncpu)"
          $ARCH_PREFIX make install
          test -x "$GITHUB_WORKSPACE/wine-install/bin/wine64" || test -x "$GITHUB_WORKSPACE/wine-install/bin/wine"
          # steamwebhelper wrapper (forces CEF --in-process-gpu + software GL so Steam's UI paints) — shipped in the runtime.
          mkdir -p "$GITHUB_WORKSPACE/wine-install/share/silo"
          WRAPPER="$GITHUB_WORKSPACE/wine-install/share/silo/steamwebhelper-wrapper.exe"
          "$($ARCH_PREFIX $BREW --prefix mingw-w64)/bin/x86_64-w64-mingw32-gcc" -O2 -municode -mwindows \
            -o "$WRAPPER" "$GITHUB_WORKSPACE/Scripts/steamwebhelper-wrapper.c"
          # Fail the build if the compiled wrapper carries the wrong CEF flags (UTF-16LE in the PE): it must
          # have --in-process-gpu and NOT --single-process (which breaks Chromium's network → login error).
          python3 - "$WRAPPER" <<'PY'
          import sys
          data = open(sys.argv[1], "rb").read()
          ok  = "--in-process-gpu".encode("utf-16-le") in data
          bad = "--single-process".encode("utf-16-le") in data
          if not ok or bad:
              sys.exit(f"ERROR: wrapper has wrong CEF flags (in-process-gpu={ok}, single-process={bad})")
          print("wrapper CEF flags OK (--in-process-gpu)")
          PY

      - name: Bundle dependency dylibs (self-contained runtime)
        run: ./Scripts/bundle-wine-dylibs.sh "$GITHUB_WORKSPACE/wine-install"

      - name: Package wine.tar.xz
        run: |
          set -eo pipefail
          # New WoW64 builds install a unified `wine`; add a wine64 alias for consumers expecting it.
          if [ -e wine-install/bin/wine ] && [ ! -e wine-install/bin/wine64 ]; then
            ( cd wine-install/bin && ln -s wine wine64 )
          fi
          ( cd wine-install && tar -cJf "$GITHUB_WORKSPACE/wine.tar.xz" . )
          shasum -a 256 wine.tar.xz > wine.tar.xz.sha256   # the app verifies this before extracting
          ls -la wine.tar.xz wine.tar.xz.sha256

      - name: Publish release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: ${{ inputs.release_tag }}
          name: ${{ inputs.release_tag }}
          files: |
            wine.tar.xz
            wine.tar.xz.sha256
          body: "CrossOver Wine ${{ inputs.crossover_version }} built from CrossOver FOSS source (LGPL). Pair with Apple GPTK/D3DMetal imported from the .dmg in-app. See WINE-BUILD.md."
